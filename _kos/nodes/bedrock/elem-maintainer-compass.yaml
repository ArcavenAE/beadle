id: elem-maintainer-compass
type: element
confidence: bedrock
title: "Maintainer engagement is the compass; contribution volume is the cargo"
tags: [beadle, intent, maintainer-signal, drift]
content: |
  beadle weights work by what maintainers actually act on (respond / label /
  close / reference / merge), reconstructed from role-filtered behavioural events.
  Reaction-popularity is demand to reconcile, never equate. Contribution volume —
  especially from an automated filer (arcavenai) — is the thing being measured,
  never the signal of value. The gap between what is filed and what maintainers
  act on is the primary "led-by-the-backlog" drift signal. No shipping tool cleanly
  separates reaction-popularity from maintainer-acted-upon signal; this separation
  is a beadle differentiator.

  Phase-0 derivation (finding-011): every comment observed on an open issue in
  the target repo is written to the out-of-band store as a `comment_event` row
  with the actor's login classified against the intent manifest as `maintainer`,
  `measured`, or `other`. The compass is then a filter — `count(role=maintainer)`
  vs `count(role=measured)` — computed from data, not asserted from inspection.
  A dashboard body claim of maintainer_engaged=N must match the store's row
  count exactly; a mismatch is a bug in the classifier, not a difference of
  opinion. First derivation against vsdd-factory (run 10): 157 events,
  0 maintainer / 157 measured / 0 other — reproducing the run-9 hand-authored
  gap of 161:0 within observation-frame drift.
