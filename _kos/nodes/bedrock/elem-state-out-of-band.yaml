id: elem-state-out-of-band
type: element
confidence: bedrock
title: "Durable state lives out-of-band; the dashboard issue is a projection"
tags: [beadle, dashboard, state, renovate]
content: |
  The universal failure mode of bot-maintained dashboards is state-in-Markdown:
  the bot parses its own rendered issue body as machine state and breaks when a
  human edits it (renovatebot/renovate#19563). beadle's source of truth is an
  out-of-band store (Phase 0: append-only JSONL; Phase 2: Dolt). The GitHub
  dashboard issue is regenerated each run as a read-only projection. beadle never
  trusts a hand-edit, embeds only a digest in a `<!-- beadle-state -->` sentinel,
  and tolerates a wiped body by regenerating cleanly. Checkboxes are derived from
  authoritative state, never authored by hand.

  Phase-0 shape (finding-011): the store is a single append-only JSONL file per
  target at `store/<target>/state.jsonl`, gitignored (live target observation,
  not source). Six record kinds — `run`, `issue`, `classification`,
  `comment_event`, `cluster`, `note` — each with `kind`/`ts`/`target` as the
  common header. Unknown-kind rows are preserved verbatim by the reader
  (`Record::Other`) so schema evolution never loses history. Canonical-JSON
  serialization (sorted keys, no trailing newline) keeps diffs stable. Watermark
  is derived (`max(issue.number)`), not stored. Idempotency is guaranteed by
  content fingerprints — comment events by `(number, ts, actor)`, issue
  observations by number-per-run. See `docs/store-schema.md` for the full
  schema and `finding-011` for what the shape settled and what it did not.
