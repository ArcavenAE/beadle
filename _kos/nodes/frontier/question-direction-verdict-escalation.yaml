id: question-direction-verdict-escalation
type: question
confidence: frontier
title: "What are the escalation thresholds for a run's direction verdict â€” on-course / watch / drifting?"
tags: [beadle, dashboard, direction-verdict, escalation, compass, phase-4]
content: |
  The SKILL.md output already promises a direction verdict per run
  (`on-course` / `watch` / `drifting`, with the top contributing signal).
  Today the verdict is editorial â€” a human authors it in the direction slot
  after reading the store. Item F from the Phase-4 retrospective asks:
  what are the concrete thresholds that promote a verdict from `on-course`
  to `watch`, and from `watch` to `drifting`?

  Three candidate metrics were named:

  A. **Filing-density derivative.** Rate of new issues per run. Rising rate
     is signal that the target is under stress or that a contributor
     (usually the measured filer) is diverging from the maintainer's
     absorption rate. Computable today from `run.new_this_run.len()` and
     the interarrival delta between adjacent `run` records.
     Proposed thresholds (needs calibration once we have >3 runs of real
     data across at least 2 targets):
       - `on-course` : filing rate flat or declining vs prior 3 runs
       - `watch`     : filing rate rising 25%+ vs prior 3 runs OR any
                       single run > 2Ã— the trailing-3 mean
       - `drifting`  : filing rate rising 50%+ vs prior 3 runs

  B. **Integrity-density derivative.** Share of new issues carrying an
     integrity-class flag (`elem-silent-integrity-severity`,
     `elem-operational-impact-axis`). Rising integrity share is a
     stronger drift signal than filing rate alone. Requires the
     classification record kind to carry an `integrity_flag` â€” deferred
     until the classifier has a first pass through the store.
     Proposed thresholds:
       - `on-course` : integrity share â‰¤ 15% of new
       - `watch`     : integrity share 15â€“30%
       - `drifting`  : integrity share > 30% for any run

  C. **Silent-data-loss share.** Count of finding-004-class silent-integrity
     issues as a fraction of the open baseline. This is the alarm layer â€”
     silent-data-loss is a *severity* class that is not just about volume,
     it's about the *nature* of the risk. Requires classification data.
     Proposed thresholds:
       - `on-course` : silent-data-loss share < 5% of open
       - `watch`     : 5â€“10%
       - `drifting`  : > 10% OR any new silent-data-loss issue with
                       zero maintainer engagement across 3+ runs

  Sub-questions:

  A1. **Calibration corpus.** The proposed thresholds are educated guesses
      from the vsdd-factory drift. We need at least two more targets before
      the numbers stop being "the ratio that fit vsdd-factory's run 9."
  A2. **Signal composition.** Should the verdict be the *max* of the three
      signals (any one drifting â†’ drifting), or a weighted vote? Current
      proposal is max â€” drift on any axis is drift.
  A3. **Rate of change window.** "Prior 3 runs" is a placeholder. Should
      the window be time-based (last 30 days), run-count-based (last 3),
      or event-count-based (last N new issues)? Deferred to first
      calibration pass.
  A4. **Silent-data-loss zero-engagement alarm.** The "3+ runs with zero
      maintainer engagement" clause is the harshest â€” it fires the
      `drifting` verdict on the exact case beadle exists to catch. Needs
      an escape hatch for when the maintainer's engagement is *pending
      response* rather than *absent* (finding-004 already flagged this).
  A5. **Verdict slot ownership.** Should `beadle direction <target>`
      *write* the verdict to the store as a `note` record, or only
      *print* it as a proposal for the editor slot? Current proposal:
      print + append a `note` record with `kind=note, category=direction-verdict`
      so the audit trail exists but the editor still owns the free-text
      paragraph. Editorial boundary (question-renderer-editorial-boundary)
      is the referee.

  Phase-4 first cut: `beadle direction <target>` computes signal A
  (filing-density derivative) and emits a proposed verdict; signals B
  and C are marked "pending classification data" until the classifier
  step produces classification records.

  Phase-4 follow-on (finding-014): signals B and C are now computed
  from `ClassificationRecord` rows for the current run when the store
  contains any; they emit `pending` with a specific `reason` only when
  no classifications exist for `run == latest_run`. The ingest contract
  ships as `beadle classify ingest <target>` â€” the Phase-0 Claude Code
  skill produces validated JSON, this binary appends to the store, and
  direction consumes downstream. `SignalOrPending` (a live schema
  variant, not a placeholder string) preserves the propose-not-act
  invariant: pending signals contribute nothing to the `max` verdict,
  so an unclassified run cannot escalate on B or C by omission.

  Still open (calibration): 15%/30% integrity thresholds and 5%/10%
  silent-data-loss thresholds are named constants awaiting the
  calibration corpus (A1) â€” â‰¥2 targets Ã— â‰¥3 runs of real classifier
  output. Also open: A4 zero-engagement alarm (needs comment_event
  join, deferred), A3 window question (trailing-3-run integrity
  share vs current-run-only, deferred to same calibration pass).
