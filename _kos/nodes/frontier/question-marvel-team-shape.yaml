title: "How does the beadle team map onto marvel's resource model (multiclaude v2)?"
tags: [beadle, marvel, agents, team, frontier]
content: |
  Phase 2 runs beadle as a marvel-orchestrated team (Workspace `triage`, one Team,
  several Roles). Open:
  - Role→replica mapping: orchestrator (the only writer, persistent), envoy
    (persistent), classifier/intent-scorer/validator/investigator/verifier
    (ephemeral, read-only), dashboard-keeper (persistent, writes only the
    dashboard issue).
  - Reuse vs new: which multiclaude roles (project-watchdog, arch-watchdog,
    retrospector, research-supervisor) are reused unchanged when a target runs them?
  - Serialization: orchestrator serializes all writes (Cognition rule); reads fan
    out; the verifier is a fresh-context adversary.
  - Blocked partly on marvel's pack-integration frontier (marvel F3) and the
    sideshow-pack contents (beadle F4).
  - Heartbeat-via-cron intervals (mutually offset, prime-ish) and session-handoff
    for context-exhaustion survival (multiclaude persistent-agent-ops).
