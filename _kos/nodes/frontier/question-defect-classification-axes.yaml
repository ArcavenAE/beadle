title: "The multi-axis defect-classification model for the classify engine"
tags: [beadle, classify, taxonomy, defect, triage, frontier]
content: |
  beadle's `classify` engine scores each artifact on multiple axes. The deep-research
  workflow (we6yrrcba, finding-005) grounded the model in standards and real OSS schemes
  and named the superset beadle now carries. "Defect" is the industry term (IEEE 1044
  classifies anomalies/defects; ODC = Orthogonal Defect Classification).

  ## The committed model (finding-005) â€” research-grounded + beadle-original

  Research-grounded axes:
  - report-type â€” GitHub Issue Types (Task/Bug/Feature) primary + kind/* long-tail
    (Kubernetes / Rust C-*/T-*/A-*/P-* precedent).
  - defect-nature â€” IEEE 1044 / ODC Defect Type, mechanicalâ†’conceptual spectrum
    (syntax â†’ off-by-one â†’ null/resource â†’ concurrency â†’ logic â†’ spec â†’ design â†’
    directional/intent-misalignment).
  - reproducibility class â€” Bohrbug | Mandelbug | Heisenbug (Grottke-Trivedi); the
    single most decision-relevant axis for evaluation cost; feeds priority's LOE term.
  - triage-state â€” needs-triage â†’ accepted â†’ needs-information.
  - severity (impact) and priority (urgency + level-of-effort) kept distinct.

  beadle-original axes (ahead of / beside the literature):
  - leverage (systemicâ†”minutiae), alignment (advancesâ†”drifts, B4 â€” the
    "directional/intent" class research logs as an unsolved open question),
    provenance (pilotâ†‘/speculativeâ†“), blast-radius visibility Ă— compounding
    (finding-004; FMEA-detectability analog), recoverability tier (finding-004),
    integrity-gates-functional precedence (finding-004 â€” a rule, not an axis).

  ## Open questions

  1. **Calibration (research openQuestion 1).** No empirical data correlates
     reproducibility class with actual maintainer fix-time. "Bohrbug = cheap" is a
     heuristic, not calibrated. Could beadle's own store accumulate this over runs?
  2. **Canonical ODC value-set (research openQuestion 2).** The fixed-7-types claim
     was REFUTED. beadle adopts the mechanicalâ†’conceptual *spectrum*, not a bounded
     enum, until a version/value-set is chosen. Which ODC version, if any?
  3. **How many axes earn their keep on the dashboard?** Ten axes is the model; the
     RENDER must not overwhelm (cf. the legibility lesson, finding-005). Which axes
     are primary facets (report-type, defect-nature), which are badges
     (reproducibility), which are drill-in only (trigger, triage-state)?
  4. **Operationalizing the directional/intent class.** Research could not name a
     detectable signal distinguishing intent-misalignment from a feature-request or a
     design defect. beadle's alignment axis (B4) is the bet â€” what evidence makes the
     class detectable rather than a judgment call?
  5. **FMEA as the citable anchor for blast-radius visibility.** The research never
     surfaced FMEA (RPN = severity Ă— occurrence Ă— detectability). Adopt it as the
     reference for finding-004's visibilityĂ—compounding axis, or keep that axis
     beadle-original?
