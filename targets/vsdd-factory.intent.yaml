# beadle intent manifest — drbothen/vsdd-factory
# Schema is frontier (charter F1); this is the working v0 shape.
# v0.2: added self_referential flag, provenance_signal axis, corpus-level minutiae
#       semantics, and self-referential rubric inversion (see finding-002).
# v0.3: added integrity_anchors (systems-of-record by recoverability tier) so the
#       silent-integrity classifier is grounded, not inferred (finding-004/005).
# v0.4: added maintainer_capacity (capacity-adjusted calibration v2 — see
#       _kos/ideas/capacity-adjusted-direction-baselines.md and SKILL §6b).
#       Direction verdicts, streak denominators, success bands, and prediction
#       horizons are conditioned on this block. Operator-ratified 2026-07-22.
schema_version: 0.4

target:
  repo: drbothen/vsdd-factory
  default_branch: develop
  local_checkout: ~/work/vsdd-factory   # for the already-fixed / citation-exists checks

# vsdd-factory is a SELF-REFERENTIAL factory: the engine and the product are one
# repo (goal 2). This INVERTS the generic "process-gap = drift" default. An issue
# about the engine's own process (orchestrator, adversary, gates, convergence) is
# NOT off-mission self-reference — for this target it directly changes product
# outcomes, because the engine IS the product. beadle MUST read this flag before
# applying the alignment_rubric: here `process-gap(...)` and `meta(...)` issues are
# on-mission by default and judged on leverage, not dismissed as self-reference.
self_referential: true

# The compass. Work is weighted by what these humans actually act on
# (respond / label / close / reference / merge) — not by volume or reactions.
maintainers:
  - drbothen
  - Zious11
# The prolific filer being measured against the compass.
measured_contributors:
  - arcavenai   # Skippy — public, reflects on the user; weight concerns highest
  - arcaven     # the human review identity

# Capacity model (v0.4, SKILL §6b). Grounds every engagement expectation in who
# the maintainers actually are: two humans, hundreds of projects, this repo a
# side project. Community anchors: 65% of popular projects have truck factor
# <= 2; 60% of maintainers are unpaid hobbyists, 78% at <= 10 h/week ACROSS ALL
# their projects; human PR acceptance ~68-73% vs bot/agent ~37-45% (full
# citations: _kos/ideas/capacity-adjusted-direction-baselines.md).
maintainer_capacity:
  class: episodic-side-project   # full-time | part-time-regular | episodic-side-project
  team_size: 2
  context: one of hundreds of projects for these maintainers; primary focus elsewhere
  attention_window: action-day   # a calendar day with >=1 maintainer action on this target
  # Derived from the store's maintainer_actions dates; refresh each run.
  observed_windows: ["2026-07-08", "2026-07-15", "2026-07-19", "2026-07-21", "2026-07-22"]
  success_bands:
    pr_acceptance:               # vs human ~68-73% / bot ~37-45% literature bands
      green: ">= 0.60"
      yellow: "0.40 - 0.60"
      red: "< 0.40"
    engagement_cadence:
      green: ">= 1 attention window with >= 1 action per month"
      red: "0 windows per quarter"
    merge_latency:
      green: "merged within <= 2 attention windows of PR readiness"
  # All streak metrics (A4 included) report attention-window denominators FIRST;
  # runs/calendar as shadow. Pre-registered prediction horizons are denominated
  # in windows (default 4-6) and must test single-window actions (SKILL §6b).

# Composite, weighted intent anchor (no single source is authoritative).
intent_sources:
  static:
    - path: CLAUDE.md
      weight: high
      note: canonical principle — production-grade default, no MVP-defer, no paper-fix
    - path: .factory/STATE.md
      weight: high
      note: live cycle goals, mode, decision log (latest D-NNN wins)
    - glob: docs/**
      weight: medium
    - path: SOUL.md
      weight: high
      optional: true
      note: not present yet; honor if added
  dynamic:
    - source: git-history
      weight: medium
      note: what actually merges signals real direction
    - source: maintainer-comments
      weight: high
      note: DrBothen/Zious11 comments/decisions are first-class intent signal

# What the project is for.
goals:
  - Production-grade-default engine discipline (F5 asymptotic convergence)
  - Self-referential factory: engine and product are one repo
  - Spec-driven, adversarially-reviewed, traceable artifacts (.factory/)
non_goals:
  - MVP-driven deferrals, "good enough", "fix later" (explicit anti-pattern)
  - Paper-fixes (rename/doc-comment/assert-only without load-bearing test)
  - Scope expansion into new domains without surfaced architecture decisions
scope_boundaries:
  - Code-vs-spec conflicts: the SPEC wins; only a human authorizes spec amendment
  - .factory/ mutations via Edit/Write only; no bypass (POL-3)

# Systems-of-record ranked by recoverability (finding-004/005). The silent-integrity
# classifier uses these to ground its top-severity class: a defect making any of these
# disagree with reality without a signal (e.g. #313 ratchet certifies PASS against
# artifacts not on disk; #314 input-hash includes frontmatter so "changed" is fiction)
# is source-of-truth corruption — top severity, gates every functional verdict.
# NB (2026-06-28): the develop checkout's .factory/ holds only logs/ — the spec_process
# and learning tiers are the tiers most exposed to "produced-but-not-committed" loss.
integrity_anchors:
  regenerable:
    - generated code / build output (re-run the engine — the cheapest thing it makes)
  spec_process:
    - .factory/STATE.md          # live cycle goals, mode — the ratchet's referent
    - the ratchet / convergence gate definition (PASS must require committed artifacts)
    - CLAUDE.md canonical principle (spec wins; the authority code is judged against)
  learning:
    - .factory/ decision log (D-NNN — why a path was chosen/abandoned)
    - adversarial findings / convergence history (accumulated uncertainty-reduction)

# Provenance is a first-class ranking signal (NOT just classification). The
# measured filer (arcavenai) produces two very different kinds of issue:
#   - pilot-derived: a real finding from running vsdd-factory on an external pilot
#     (e.g. ftc-blue), with cited commits/files/reproduction. Highest value for a
#     self-referential factory — this is dogfooding the engine. Rank ABOVE.
#   - speculative: invented machinery / "might need" with no observed failure.
#     This is the over-engineering the project's own non_goals warn against.
# beadle infers provenance from the body (cited real commit/file/run vs none) and
# weights pilot-derived findings up, speculative proposals down.
provenance_signal:
  pilot_derived_markers:
    - cites a real commit sha / PR / run with a reproduction
    - "'observed in a real greenfield run' / 'external pilot' framing"
    - concrete metrics or git evidence (git log, file paths, hashes)
  speculative_markers:
    - proposes a mechanism with no observed failure
    - "'we might' / 'in the future' / 'to be safe' without a triggering incident"

# How an issue/PR is scored. Graded, cited — never a bare label.
# NOTE the self_referential inversion above: engine process/meta issues are
# on-mission here; judge them on leverage + provenance, not as self-reference.
alignment_rubric:
  advances:
    - closes a real defect class with a load-bearing test
    - tightens an existing gate / removes a drift surface
    - improves traceability or convergence soundness
    - "(self-referential) a pilot-derived engine process-gap or meta finding that
       hardens the factory's own gates/convergence — on-mission, not self-reference"
  neutral:
    - documentation/cosmetic with bounded blast radius
    - "a study/observation request with no fix yet (e.g. a cost-arc to characterize)
       — neutral-to-advances depending on whether it surfaces a real drift surface"
  drifts:
    - proposes machinery before a concrete need (gradual-elaboration violation)
    - couples otherwise-independent components
    - re-files an already-decided question; contradicts a maintainer decision
    - "a SPECULATIVE self-referential process-gap with no observed failure and no
       product-outcome path (NB: pilot-derived engine gaps are advances, not this)"
    - hallucinated citation / fix-not-fixed / surface-plausible but fabricated

# Drift / minutiae detectors surfaced on the dashboard's Direction Health panel.
# CRITICAL: these run at the CORPUS level against the measured filer (arcavenai),
# not only per-issue. The "led-by-the-backlog" signal is a property of the whole
# filing pattern (N granular engine process-gaps, M<<N maintainer actions), not of
# any single issue. beadle must compute and surface these even when each individual
# issue scores "advances" — a backlog of individually-sound minutiae is exactly the
# drift this target fears. (Cold-start caveat ADR-005 still applies to RATE claims;
# the structural ratio is reportable as baseline, the trend is not yet.)
minutiae_signals:
  - low_leverage_ratio_rising
  - filed_vs_acted_gap_widening      # arcavenai files N, maintainers act on M<<N
  - cluster_same_lever_filed_n_times # candidate meta/tracking issue, not N issues
  - over_engineering_fingerprints    # premature abstraction, speculative config
  - convert_finding_to_guard_unbounded  # every adversarial finding → a new permanent
                                         # CI lint with no decay term (see issue #308);
                                         # the factory's own minutiae-generation reflex

# Compose the existing per-issue discipline rather than reinventing it.
composes_skill: arcavenai-issue-review
