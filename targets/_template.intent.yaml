# beadle intent manifest — TEMPLATE. Copy to <project>.intent.yaml and populate.
# Distributed by pack.yaml to a consumer repo as .beadle/intent.yaml.
# v0.3: added integrity_anchors (systems-of-record by recoverability tier) so the
#       silent-integrity classifier has grounding instead of inference (finding-004,
#       finding-005). The defect-nature / reproducibility / report-type / triage-state
#       axes are engine-level (target-agnostic) and live in the skill, NOT here.
schema_version: 0.3

target:
  repo: owner/name
  default_branch: main
  local_checkout: null

# Set true ONLY for a self-referential project where the engine and the product
# are the same repo (the tool builds itself). When true, beadle does NOT treat
# "process-gap / meta" issues as off-mission self-reference — they change product
# outcomes because the engine IS the product. Inverts the generic drift rule.
# Default false for ordinary products.
self_referential: false

# The compass — work is weighted by what these humans act on, not by volume.
maintainers: []
measured_contributors: []

# Composite, weighted anchor — prefer existing repo docs over inventing new ones.
intent_sources:
  static:
    - path: README.md
      weight: medium
    - path: CLAUDE.md
      weight: high
      optional: true
    - path: SOUL.md
      weight: high
      optional: true
  dynamic:
    - source: maintainer-comments
      weight: high
    - source: git-history
      weight: medium

goals: []
non_goals: []
scope_boundaries: []

# Systems-of-record this target depends on, ranked by RECOVERABILITY (finding-004,
# finding-005). The silent-integrity classifier (skill step 3) uses these to ground
# its highest-severity class instead of guessing: a defect that makes any of these
# disagree with reality without a signal, or threatens the irreplaceable tier, is
# top severity and gates every functional verdict computed over it. List per target;
# omit/empty for an ordinary product with no out-of-band source of truth.
integrity_anchors:
  # tier: regenerable — re-run the generator (cheapest); losing it costs tokens/time.
  regenerable: []        # e.g. build output, generated code, compiled artifacts
  # tier: spec_process — the AUTHORITY code is judged against; only a human amends it.
  spec_process: []       # e.g. the spec, process/state file, ratchet definition
  # tier: learning — IRREPLACEABLE; cannot be cheaply re-derived (the expensive output).
  learning: []           # e.g. decision log, adversarial findings, convergence history

# Provenance is a ranking signal, not just a label: a pilot-derived finding (cites
# a real commit/file/run/reproduction) outranks a speculative proposal (invented
# machinery, no observed failure). beadle infers it from the body.
provenance_signal:
  pilot_derived_markers:
    - cites a real commit sha / PR / run with a reproduction
    - concrete metrics or git evidence
  speculative_markers:
    - proposes a mechanism with no observed failure
    - "'might need' / 'to be safe' without a triggering incident"

alignment_rubric:
  advances: []
  neutral: []
  drifts: []

# Computed at the CORPUS level against the measured filer, not only per-issue:
# a backlog of individually-sound issues can still be "led-by-the-backlog" drift.
minutiae_signals:
  - low_leverage_ratio_rising
  - filed_vs_acted_gap_widening
  - cluster_same_lever_filed_n_times
  - over_engineering_fingerprints

composes_skill: arcavenai-issue-review
status: draft-unpopulated
