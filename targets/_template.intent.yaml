# beadle intent manifest — TEMPLATE. Copy to <project>.intent.yaml and populate.
# Distributed by pack.yaml to a consumer repo as .beadle/intent.yaml.
schema_version: 0.1

target:
  repo: owner/name
  default_branch: main
  local_checkout: null

# Set true ONLY for a self-referential project where the engine and the product
# are the same repo (the tool builds itself). When true, beadle does NOT treat
# "process-gap / meta" issues as off-mission self-reference — they change product
# outcomes because the engine IS the product. Inverts the generic drift rule.
# Default false for ordinary products.
self_referential: false

# The compass — work is weighted by what these humans act on, not by volume.
maintainers: []
measured_contributors: []

# Composite, weighted anchor — prefer existing repo docs over inventing new ones.
intent_sources:
  static:
    - path: README.md
      weight: medium
    - path: CLAUDE.md
      weight: high
      optional: true
    - path: SOUL.md
      weight: high
      optional: true
  dynamic:
    - source: maintainer-comments
      weight: high
    - source: git-history
      weight: medium

goals: []
non_goals: []
scope_boundaries: []

# Provenance is a ranking signal, not just a label: a pilot-derived finding (cites
# a real commit/file/run/reproduction) outranks a speculative proposal (invented
# machinery, no observed failure). beadle infers it from the body.
provenance_signal:
  pilot_derived_markers:
    - cites a real commit sha / PR / run with a reproduction
    - concrete metrics or git evidence
  speculative_markers:
    - proposes a mechanism with no observed failure
    - "'might need' / 'to be safe' without a triggering incident"

alignment_rubric:
  advances: []
  neutral: []
  drifts: []

# Computed at the CORPUS level against the measured filer, not only per-issue:
# a backlog of individually-sound issues can still be "led-by-the-backlog" drift.
minutiae_signals:
  - low_leverage_ratio_rising
  - filed_vs_acted_gap_widening
  - cluster_same_lever_filed_n_times
  - over_engineering_fingerprints

composes_skill: arcavenai-issue-review
status: draft-unpopulated
